data:
  manifest_path: data/manifest.csv
  image_size: 224
  num_workers: 4         # 0 → 4 (졸프실 PC CPU 코어 활용)
  val_split: 0.15        # 0.20 → 0.15 (큰 데이터엔 15%로 충분)
  test_split: 0.10       # 0.0 → 0.10 (test set 복원)
  split_by: id

training:
  epochs: 30
  batch_size: 16         # 8 → 16 (RTX 5060 8GB 기준 안전치)
  optimizer: adam
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 1
  regression_weight: 1.0
  classification_weight: 0.5
  amp: true              # CUDA에서 자동 활성화

validation_mode:
  max_samples: 2000      # 500 → 2000 (GPU 빠르니 더 큰 검증)
  epochs: 10             # 5 → 10
  log_every: 5

logging:
  output_dir: checkpoints
  log_dir: runs
  save_every: 5