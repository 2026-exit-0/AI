# damda AI Baseline 학습 설정 (GPU 환경, v5.5b)
#
# v5.5b 변경 사항 (v5.5 → v5.5b):
#   - training.early_stop_patience: 8 → 15
#   - 이유: v5.5 가 epoch 20 에서 early_stop (v5.1 은 ep48 까지 학습).
#     새 categorical_branch 가 random init 이라 학습 수렴에 더 많은 epoch 필요.
#     patience 늘려서 categorical_branch 안정화 + 강한 헤드 학습 부족 해소 시도.
#   - 그 외 v5.5 와 동일 (categorical_inputs / scanner aug 약화 / sensor / CE)
#
# 검증: composite > 0.67 면 categorical 가설 확정 + v5.1 능가
# 실패: 동일 결과면 categorical 신호 자체가 약함 (v6 / v6.5 로 방향 전환)
#
# v5.5 변경 사항 (v5.1 → v5.5):
#   - data.categorical_inputs 신규: {skin_type: 6, sensitive: 2}
#     → 사용자 자가입력을 모델 INPUT 으로 활용
#   - skin_type, sensitive 는 classification_heads 에서 자동 제거 (train.py)
#
# v5.1 변경 사항 (v5 → v5.1):
#   - dataset.py 의 scanner aug 강도 약화 (~40% 수준)
#     · LowResSimulate: low_range 64-128→128-192, p 0.6→0.3 (v5 주범)
#     · GaussianBlur: radius 0.3-1.2→0.2-0.8, p 0.5→0.3
#     · ColorJitter: 강화 → v3/normal 수준 복귀
#     · JPEGCompress: quality 30-70→60-85, p 0.7→0.4
#     · GaussianNoise: std 0-0.05→0-0.025, p 0.6→0.4
#   - 그 외 yaml 항목 v5 와 동일 (augment_mode/sensor_inputs/classification_loss 등)
#
# v5 결과 (참고): composite 0.5513 (v3 0.6461 대비 -0.0948).
# 디테일 의존 헤드 큰 폭 악화 (pore +38%, pigment +45%, wrinkle_grade -25%).
# 거시 헤드는 영향 작음 → aug 강도 dial 만 약화하면 회복 가능 가설.
# 상세는 PROGRESS.md §4 v5 / v5.1 절 참고
#
# 이전 변경 (v4 → v5):
#   - augment_mode: normal → scanner (ESP32-CAM 도메인 갭 mitigation)
#   - sensor_inputs: [] → [moisture] (FDC2112 매핑)
#   - regression_targets: moisture 제거 (sensor 와 leakage 방지)
#   - classification_loss: focal → ce (v4 의 focal 실패)

seed: 42

# ===== Data =====
data:
  manifest_path: data/manifest.csv
  image_size: 224
  num_workers: 4
  val_split: 0.15
  test_split: 0.10
  split_by: id            # 'id' (대상자 단위) — 같은 사람이 train/val 섞이지 않음

  # v5: ESP32-CAM 시연 환경 도메인 갭 대비 ON.
  # 'normal' (v1~v4) — 기본 학습 증강 (Resize/Crop/Flip/Rotation/ColorJitter/Erasing)
  # 'scanner' (v5+)  — 위 + LowResSimulate + GaussianBlur + ColorJitter 강화 + JPEG compress + GaussianNoise
  #                    AI-Hub (스튜디오) ↔ ESP32-CAM (OV2640, 640×480, 강 JPEG, 저조도 노이즈) 갭 mitigation
  # 자세한 갭 분석은 NOTES.md §8 참고. eval/test 추론 시엔 무관 (결정론적).
  augment_mode: scanner

  # v5: 센서 입력 학습 (Phase 2) ON.
  # 학습: AI-Hub manifest 의 measurement 컬럼 (moisture) 을 sensor 자리에 주입
  # 추론: ESP32-CAM 의 FDC2112 (정전용량 수분 센서) 가 같은 자리에 실시간 측정값 입력
  # 단위 캘리브레이션: FDC2112 ↔ AI-Hub corneometer 변환식은 별도 작업 (PROGRESS §6 의존성 참고)
  # 결측 행은 sensor_mask=0 처리 → model.py 의 sensor_branch 가 마스킹 적용.
  # ⚠ sensor_inputs 의 컬럼명은 regression_targets 와 절대 겹치면 안 됨 (data leakage)
  sensor_inputs:
    - moisture

  # v5.5+: 사용자 자가입력을 모델 input 으로 활용 (one-hot 인코딩).
  # dict {col_name: num_classes}. 학습 시엔 manifest 의 정수값. 추론 시엔 UI questionnaire.
  # ⚠ 이 컬럼들은 classification_heads 와 겹치면 train.py 가 자동으로 분류 output 에서 제거.
  # 매핑 (한국어 → 정수) 은 infer.py 의 SKIN_TYPE_TO_INT / SENSITIVE_TO_INT 참고 (placeholder).
  categorical_inputs:
    skin_type: 6
    sensitive: 2

# ===== Model =====
model:
  backbone: resnet50
  pretrained: true
  region_emb_dim: 16
  num_regions: 9          # PART_0, FOREHEAD, GLABELLA, L_EYE, R_EYE, L_CHEEK, R_CHEEK, LIP, CHIN
  dropout: 0.2
  sensor_emb_dim: 32      # sensor_branch 의 hidden + 출력 차원. sensor_dim=1 → 입력 1차원, 출력 32 차원

  # v3: build_manifest.py 수정으로 다음 두 값을 부위 특화로 채움:
  #   - pigmentation_value: PART_0 의 pigmentation_count (전체 얼굴 색소반점 개수)
  #   - wrinkle_value:      L_EYE/R_EYE 의 *_wrinkle_Ra (평균 거칠기)
  # 다른 부위는 NaN → dataset.py 에서 mask=0 으로 자동 제외 (정상 동작)
  #
  # v5: moisture 제거 (sensor 입력으로 이동, data leakage 방지). 4개 헤드.
  # 시연 시 moisture 값은 FDC2112 가 직접 표시 — 모델 예측 아님.
  regression_targets:
    - elasticity_mean
    - pore_value
    - pigmentation_value
    - wrinkle_value

  # 클래스 수는 manifest의 라벨 unique 값 기준 (max + 1)
  classification_heads:
    wrinkle_grade: 7        # 0~6
    pigmentation_grade: 6   # 0~5
    pore_grade: 6           # 0~5
    dryness_grade: 5        # 0~4
    sagging_grade: 7        # 0~6
    skin_type: 6            # 0~5
    sensitive: 2            # binary

# ===== Training =====
training:
  epochs: 50              # 30→50: overfit 신호 없어 더 길게 (early_stop이 안전망)
  batch_size: 16          # RTX 5060 8GB VRAM 기준 안전치 (OOM 시 12 또는 8로)
  optimizer: adam
  lr: 0.0008              # v3 검증값 유지
  weight_decay: 0.0001
  scheduler: cosine       # cosine | step | none
  warmup_epochs: 1

  regression_weight: 1.0
  classification_weight: 0.5

  # v3: false. v2에서 분류 전반 악화이고 약한 헤드도 개선 안 됨 → balanced 가중치 역효과.
  # v4: false 유지. focal loss 로 약한 헤드 처치 시도 (실패).
  # v5: false 유지.
  use_class_weights: false

  # v4: focal γ=2.0 → test set 에서 전 헤드 regression 확인됨 (skin_type F1 -11.6%, 회귀 4개 동반 악화).
  # v5: ce 복귀 (v3 와 동일). 약한 헤드 처치는 v5.5+ 별도 실험 (PROGRESS §5 참고)
  classification_loss: ce
  focal_gamma: 0.0        # ce 사용 시 무시됨. 명시적으로 0

  # Early stopping — val/loss/total 이 N epoch 동안 개선 없으면 종료. 0=비활성
  # v5.5b: 8 → 15. categorical_branch 의 random init 학습 수렴 시간 확보.
  early_stop_patience: 15

  amp: true               # CUDA에서 자동 활성화. MPS/CPU는 무시.

# ===== Validation mode (--validation-mode) =====
validation_mode:
  max_samples: 2000
  epochs: 10
  log_every: 5

# ===== Logging =====
logging:
  output_dir: checkpoints
  log_dir: runs
  save_every: 1           # 매 epoch 저장 (야간 학습 안전성)
