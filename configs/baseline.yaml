# damda AI Baseline 학습 설정 (GPU 환경)

seed: 42

# ===== Data =====
data:
  manifest_path: data/manifest.csv
  image_size: 224
  num_workers: 4
  val_split: 0.15
  test_split: 0.10
  split_by: id            # 'id' (대상자 단위) — 같은 사람이 train/val 섞이지 않음

# ===== Model =====
model:
  backbone: resnet50
  pretrained: true
  region_emb_dim: 16
  num_regions: 9          # PART_0, FOREHEAD, GLABELLA, L_EYE, R_EYE, L_CHEEK, R_CHEEK, LIP, CHIN
  dropout: 0.2

  # v3: pigmentation_value / wrinkle_value 는 manifest에 0건 (100% 결측) → 헤드 제거.
  # 학습 신호 0이라 backbone 용량만 낭비하고 무관 gradient 만 흐름.
  # (분류 헤드의 pigmentation_grade / wrinkle_grade 는 그대로 유지 — 별도 신호)
  regression_targets:
    - moisture
    - elasticity_mean
    - pore_value

  # 클래스 수는 manifest의 라벨 unique 값 기준 (max + 1)
  classification_heads:
    wrinkle_grade: 7        # 0~6
    pigmentation_grade: 6   # 0~5
    pore_grade: 6           # 0~5
    dryness_grade: 5        # 0~4
    sagging_grade: 7        # 0~6
    skin_type: 6            # 0~5
    sensitive: 2            # binary

# ===== Training =====
training:
  epochs: 50              # 30→50: overfit 신호 없어 더 길게 (early_stop이 안전망)
  batch_size: 16          # RTX 5060 8GB VRAM 기준 안전치 (OOM 시 12 또는 8로)
  optimizer: adam
  lr: 0.0008              # v3: 0.0006→0.0008. cosine 활용은 유지하되 약간 회복
  weight_decay: 0.0001
  scheduler: cosine       # cosine | step | none
  warmup_epochs: 1

  regression_weight: 1.0
  classification_weight: 0.5

  # v3: false. v2에서 분류 전반 악화 (pore +0.08, pigmentation +0.07, dryness +0.03)이고
  # 약한 헤드(wrinkle/skin_type/sensitive)도 개선 안 됨 → balanced 가중치 역효과.
  # 약한 헤드는 v4에서 focal loss 등으로 별도 처치 예정.
  use_class_weights: false

  # Early stopping — val/loss/total 이 N epoch 동안 개선 없으면 종료. 0=비활성
  early_stop_patience: 8

  amp: true               # CUDA에서 자동 활성화. MPS/CPU는 무시.

# ===== Validation mode (--validation-mode) =====
validation_mode:
  max_samples: 2000
  epochs: 10
  log_every: 5

# ===== Logging =====
logging:
  output_dir: checkpoints
  log_dir: runs
  save_every: 1           # 매 epoch 저장 (야간 학습 안전성)
