# damda AI Baseline 학습 설정 (GPU 환경, v4)

seed: 42

# ===== Data =====
data:
  manifest_path: data/manifest.csv
  image_size: 224
  num_workers: 4
  val_split: 0.15
  test_split: 0.10
  split_by: id            # 'id' (대상자 단위) — 같은 사람이 train/val 섞이지 않음

  # v5+: ESP32-CAM 시연 환경 도메인 갭 대비.
  # 'normal' (v1~v4) — 기본 학습 증강 (Resize/Crop/Flip/Rotation/ColorJitter/Erasing)
  # 'scanner'        — 위 + LowResSimulate + GaussianBlur + ColorJitter 강화 + JPEG compress + GaussianNoise
  #                    AI-Hub (스튜디오) ↔ ESP32-CAM (OV2640, 640×480, 강 JPEG, 저조도 노이즈) 갭 mitigation
  # 자세한 갭 분석은 NOTES.md §8 참고. eval/test 추론 시엔 무관 (결정론적).
  augment_mode: normal

  # v5+: 센서 입력 학습 (Phase 2). manifest 의 컬럼명 리스트.
  # 빈 리스트 [] (또는 미지정) 이면 sensor 비활성 — model.sensor_dim=0, v1~v4 와 동일 동작.
  # 시연 하드웨어와의 매핑 (NOTES.md §8 참고):
  #   - moisture (FDC2112 정전용량 수분 센서 매핑)
  #   - 조도 컬럼은 AI-Hub 에 없음 → 시연 시점에만 VEML7700 값을 사용 (학습은 moisture 만)
  # 학습 시 결측 행은 sensor_mask=0 으로 처리 (model.py 의 sensor_branch 가 마스킹 적용).
  sensor_inputs: []

# ===== Model =====
model:
  backbone: resnet50
  pretrained: true
  region_emb_dim: 16
  num_regions: 9          # PART_0, FOREHEAD, GLABELLA, L_EYE, R_EYE, L_CHEEK, R_CHEEK, LIP, CHIN
  dropout: 0.2

  # v3: build_manifest.py 수정으로 다음 두 값을 부위 특화로 채움:
  #   - pigmentation_value: PART_0 의 pigmentation_count (전체 얼굴 색소반점 개수)
  #   - wrinkle_value:      L_EYE/R_EYE 의 *_wrinkle_Ra (평균 거칠기)
  # 다른 부위는 NaN → dataset.py 에서 mask=0 으로 자동 제외 (정상 동작)
  regression_targets:
    - moisture
    - elasticity_mean
    - pore_value
    - pigmentation_value
    - wrinkle_value

  # 클래스 수는 manifest의 라벨 unique 값 기준 (max + 1)
  classification_heads:
    wrinkle_grade: 7        # 0~6
    pigmentation_grade: 6   # 0~5
    pore_grade: 6           # 0~5
    dryness_grade: 5        # 0~4
    sagging_grade: 7        # 0~6
    skin_type: 6            # 0~5
    sensitive: 2            # binary

# ===== Training =====
training:
  epochs: 50              # 30→50: overfit 신호 없어 더 길게 (early_stop이 안전망)
  batch_size: 16          # RTX 5060 8GB VRAM 기준 안전치 (OOM 시 12 또는 8로)
  optimizer: adam
  lr: 0.0008              # v3: 0.0006→0.0008. cosine 활용은 유지하되 약간 회복
  weight_decay: 0.0001
  scheduler: cosine       # cosine | step | none
  warmup_epochs: 1

  regression_weight: 1.0
  classification_weight: 0.5

  # v3: false. v2에서 분류 전반 악화 (pore +0.08, pigmentation +0.07, dryness +0.03)이고
  # 약한 헤드(wrinkle/skin_type/sensitive)도 개선 안 됨 → balanced 가중치 역효과.
  # v4: false 유지. focal loss 로 약한 헤드 처치 (아래 classification_loss 참고).
  use_class_weights: false

  # v4: 분류 손실 종류. 'ce' | 'focal'. focal 은 hard example 에 손실 집중 (γ=focal_gamma).
  # γ=0 이면 CE 와 수학적 동일. 7개 분류 헤드에 일괄 적용.
  # 의도: cls_skin_type (1.5057) / cls_wrinkle_grade (1.1962) 개선.
  classification_loss: focal
  focal_gamma: 2.0

  # Early stopping — val/loss/total 이 N epoch 동안 개선 없으면 종료. 0=비활성
  early_stop_patience: 8

  amp: true               # CUDA에서 자동 활성화. MPS/CPU는 무시.

# ===== Validation mode (--validation-mode) =====
validation_mode:
  max_samples: 2000
  epochs: 10
  log_every: 5

# ===== Logging =====
logging:
  output_dir: checkpoints
  log_dir: runs
  save_every: 1           # 매 epoch 저장 (야간 학습 안전성)
